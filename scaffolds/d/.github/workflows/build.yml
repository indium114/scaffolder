name: Build D project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Dlang
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc

      - name: Build
        run: dub build --build=release

  nix-build:
    name: Nix Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31.9.1
        with:
          extra_nix_config: |
            extra-experimental-features = nix-command flakes

      - name: Build from flake
        run: nix build .#example # TODO: Change
